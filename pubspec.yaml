name: 'just_another_workout_timer'
version: '2.0.1'
environment:
  sdk: '>=3.9.0'
description: Workout Timer — interval workouts with TTS announcements.

dependencies:
  collection: '^1.18.0'
  dynamic_color: '^1.8.1'
  flutter:
    sdk: flutter
  flutter_file_dialog: '^3.0.3'
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: '^2.4.7'
  flutter_phoenix: '^1.1.1'
  flutter_tts: '^4.2.5'
  fluttertoast: '^9.0.0'
  intl: '^0.20.2'
  json_annotation: '^4.12.0'
  numberpicker: '^2.1.2'
  path: '^1.8.0'
  path_provider: '^2.1.5'
  pref: '^2.8.0'
  prefs: '^4.2.0'
  provider: '^6.1.5+1'
  saf_util: '^2.1.0'
  scrollable_positioned_list: '^0.3.8'
  share_plus: '^13.1.0'
  soundpool: '^2.4.1'
  url_launcher: '^6.3.2'
  uuid: '^4.5.3'
  wakelock_plus: '^1.6.1'

dependency_overrides:
  soundpool:
    path: ./local_plugins/soundpool

dev_dependencies:
  build_runner: '^2.15.0'
  flutter_launcher_icons: '^0.14.4'
  flutter_lints: '^6.0.0'
  flutter_oss_licenses: '^3.2.0'
  flutter_test:
    sdk: flutter
  intl_utils: '^2.8.14'
  json_serializable: '^6.14.0'
  pubspec_dependency_sorter: '^1.0.5'

flutter:
  uses-material-design: true
  generate: false
  assets: 
    - LICENSE
    - 'assets/beep_low.wav'
    - 'assets/beep_high.wav'
    - 'assets/tick.wav'

flutter_launcher_icons:
  android: 'launcher_icon'
  ios: false
  image_path: 'assets/ic_launcher.png'
  adaptive_icon_foreground: 'assets/ic_launcher_foreground.png'
  adaptive_icon_background: '#2E3440'

flutter_intl:
  enabled: true

flutter_native_splash:
  color: '#D8DEE9'
  color_dark: '#2E3440'
  image: 'assets/ic_launcher_foreground.png'
  fullscreen: true
  android_gravity: center
  android: true
  ios: false
  web: false
  android_12:
    color: '#D8DEE9'
    icon_background_color: '#D8DEE9'
    color_dark: '#2E3440'
    icon_background_color_dark: '#2E3440'

script_runner:
  scripts:
    - licenses: dart pub run flutter_oss_licenses:generate.dart
    - translations: dart run intl_utils:generate
    - launcher_icons: flutter pub run flutter_launcher_icons
    - native_splash: flutter pub run flutter_native_splash:create
    - build_runner: dart run build_runner build
    - build: scr licenses && scr translations && scr launcher_icons && scr native_splash && scr build_runner