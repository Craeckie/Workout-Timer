name: Create release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v2.0.0). Must already exist.'
        required: true

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: '21.x'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: "3.41.x"

      - name: Setup Flutter
        run: |
          flutter config --no-analytics
          flutter pub get
          dart pub global activate script_runner
          scr build

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build APKs
        run: flutter build apk --split-per-abi --target-platform android-arm64,android-arm

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | tr -d '\r\n' | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Extract release notes
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          awk '/^# \['"$VERSION_NAME"'\]/{found=1; next} found && /^(---|# \[)/{exit} found' \
            CHANGELOG.md > "$RUNNER_TEMP/release_notes.md"

      - name: Sign APKs
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          BUILD_TOOLS=$(ls -d "$ANDROID_HOME"/build-tools/*/ | sort -V | tail -n1)
          RELEASE_DIR=build/app/outputs/apk/release
          for UNSIGNED in "$RELEASE_DIR"/app-*-release.apk; do
            case "$(basename "$UNSIGNED")" in
              *arm64-v8a*)   ABI=arm64-v8a ;;
              *armeabi-v7a*) ABI=armeabi-v7a ;;
              *)             ABI=universal ;;
            esac
            SIGNED="$RELEASE_DIR/com.craeckie.workouttimer-${VERSION_NAME}-${ABI}.apk"
            "${BUILD_TOOLS}apksigner" sign \
              --ks "$RUNNER_TEMP/release.jks" \
              --ks-key-alias "$KEY_ALIAS" \
              --ks-pass "pass:$KEYSTORE_PASSWORD" \
              --key-pass "pass:$KEYSTORE_PASSWORD" \
              --v1-signing-enabled false \
              --v2-signing-enabled true \
              --v3-signing-enabled false \
              --out "$SIGNED" \
              "$UNSIGNED"
            "${BUILD_TOOLS}apksigner" verify "$SIGNED"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: ${{ runner.temp }}/release_notes.md
          files: build/app/outputs/apk/release/com.craeckie.workouttimer-*.apk
