name: Create release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: '21.x'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: "3.41.x"

      - name: Setup Flutter
        run: |
          flutter config --no-analytics
          flutter pub get
          dart pub global activate script_runner
          scr build

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build APKs
        run: flutter build apk --split-per-abi --target-platform android-arm64,android-arm

      - name: Sign APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: ./build/app/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: key
          keyStorePassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
          keyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "35.0.0"

      - name: Upload Release Artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNED_FILES: ${{ steps.sign_app.outputs.signedReleaseFile }}
          TAG: ${{ github.ref_name }}
        run: |
          IFS=',' read -ra FILES <<< "$SIGNED_FILES"
          for f in "${FILES[@]}"; do
            case "$(basename "$f")" in
              *arm64-v8a*)   abi=arm64-v8a ;;
              *armeabi-v7a*) abi=armeabi-v7a ;;
              *x86_64*)      abi=x86_64 ;;
              *)             abi=universal ;;
            esac
            gh release upload "$TAG" "$f#com.craeckie.workouttimer-$abi.apk"
          done
